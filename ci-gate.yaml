# .github/workflows/enforce.yml
name: Enforcement Gate
on: [pull_request]
jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }
      - run: npm ci
      - run: npm run lint && npm run typecheck
      - run: npm run test -- --coverage
      - name: promtool check rules
        run: promtool check rules prometheus/rules/*.yml
      - name: Check release_channel label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('release_channel')) 
              throw new Error('Missing release_channel label → merge blocked');
      - name: Fail if any step failed
        if: failure()
        run: exit 1